<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <style>
    /* Default / Light Mode: Bold black compass structure */
    .compass-stroke {
      fill: none;
      stroke: #000000;
      stroke-width: 22;
      stroke-linecap: round;
      stroke-linejoin: round;
      transition: stroke 0.2s ease;
    }
    .compass-circle {
      fill: none;
      stroke: #000000;
      stroke-width: 34;
      stroke-linecap: square;
      transition: stroke 0.2s ease;
    }
    
    /* Gold Arrow remains beautifully constant in both modes */
    .gold-arrow {
      fill: #C9A84C;
      transition: fill 0.2s ease;
    }
    
    /* Dark Mode: The black part instantly becomes crisp white */
    @media (prefers-color-scheme: dark) {
      .compass-stroke {
        stroke: #ffffff;
      }
      .compass-circle {
        stroke: #ffffff;
      }
    }
  </style>

  <!-- COMPASS CIRCLE WITH TOP GAPS -->
  <!-- Center is (256, 274), Radius is 182.
       Angle 280 deg: x = 256 + 182 * cos(280 deg) = 256 + 182 * 0.1736 = 287.6, y = 274 - 182 * sin(280 deg) = 274 - 182 * 0.9848 = 94.8
       Angle 260 deg: x = 256 + 182 * cos(260 deg) = 256 - 182 * 0.1736 = 224.4, y = 274 - 182 * sin(260 deg) = 274 - 182 * 0.9848 = 94.8
  -->
  <path class="compass-circle" d="M 287.6 94.8 A 182 182 0 1 1 224.4 94.8" />

  <!-- CROSSHAIR LINES (WITH ROUNDED CAPS) -->
  <!-- Horizontal line: centered at y=274, x from 20 to 492 -->
  <line class="compass-stroke" x1="20" y1="274" x2="492" y2="274" />
  
  <!-- Vertical line: bottom half only, centered at x=256, y from 274 to 496 -->
  <line class="compass-stroke" x1="256" y1="274" x2="256" y2="496" />

  <!-- GOLD NEEDLE / ARROW -->
  <!-- Centered at x=256. 
       - Tip of arrowhead: (256, 12)
       - Arrowhead base: y=76, x from 216 to 296 (width 80)
       - Collar: y=76 to 86, x from 244 to 268 (width 24)
       - Stem: y=86 to 274, x from 246 to 266 (thickness 20)
  -->
  <path class="gold-arrow" d="
    M 256 12
    L 296 76
    L 268 76
    L 268 86
    L 266 86
    L 266 274
    L 246 274
    L 246 86
    L 244 86
    L 244 76
    L 216 76
    Z" />
</svg>